[[headers]]
  # CORS and caching for all paths
  for = "/*"

  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Static JSON data files — immutable once deployed, cache aggressively
[[headers]]
  for = "/books/*.json"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/people/*.json"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index/*.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# API endpoints should not be cached
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache"

# Versioned API paths: /v2/ maps to root for backward-compatible evolution
[[redirects]]
  from = "/v2/*"
  to = "/:splat"
  status = 200

# Serverless API endpoints (Netlify Functions)
[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/random-hadith"
  to = "/.netlify/functions/random-hadith"
  status = 200

[[redirects]]
  from = "/api/stats"
  to = "/.netlify/functions/stats"
  status = 200

[[redirects]]
  from = "/api/narrator-hadiths"
  to = "/.netlify/functions/narrator-hadiths"
  status = 200
